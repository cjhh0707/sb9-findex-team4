spring:
  application:
    name: findex

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/findex}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  task:
    scheduling:
      enabled: true

external:
  api:
    baseurl: https://apis.data.go.kr/1160100/service/GetMarketIndexInfoService
    apiKey: ${EXTERNAL_API_KEY:f5759f46d12642c4bb7abcef715f00852b122aff6470be85d69818f50be1074c}

batch:
  sync:
    info:
      fixed-delay: 86400000
    enabled-index-data:
      fixed-delay: 86400000

logging:
  level:
    org.hibernate: INFO

#server:
#  forward-headers-strategy: framework
server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs